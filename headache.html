<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Headache at the Pharmacy</title>
<style>
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#eef4ff;color:#223047}
.app{max-width:1100px;margin:auto;padding:24px}.top{margin-bottom:20px}.game{display:grid;grid-template-columns:1fr 1fr;gap:20px}.panel{background:#fff;border-radius:20px;border:1px solid #d9e1ee;padding:20px}.options button{display:block;width:100%;margin:8px 0;padding:12px;border-radius:10px;border:1px solid #d9e1ee;background:#fff;cursor:pointer;font-size:16px}.options button:hover{background:#eef4ff}.feedback{margin:12px 0;padding:10px;border-radius:10px;background:#fff9e6}.hidden{display:none}.result{padding:16px;border-radius:12px;background:#f4f7ff;margin-top:12px}a.nav{display:inline-block;margin-top:12px;color:#2b5ea3;text-decoration:none;font-weight:bold}
</style>
</head>
<body>
<div class="app">
<div class="top">
<h1>Headache at the Pharmacy</h1>
<p>Learn how to tell your symptoms clearly.</p>
</div>
<div class="game">
<div class="panel">
<svg viewBox="0 0 400 220" style="width:100%;margin-bottom:15px">
<rect x="0" y="0" width="400" height="220" fill="#eef4ff"/>
<rect x="200" y="120" width="180" height="60" fill="#ffffff" stroke="#ccd6ea"/>
<rect x="250" y="20" width="120" height="70" fill="#ffffff" stroke="#ccd6ea"/>
<rect x="260" y="30" width="20" height="20" fill="#7ec8ff"/>
<rect x="285" y="30" width="20" height="20" fill="#ffd27e"/>
<rect x="310" y="30" width="20" height="20" fill="#7ee0a0"/>
<circle cx="280" cy="100" r="18" fill="#ffd6c2"/>
<rect x="265" y="115" width="30" height="35" fill="#ffffff" stroke="#ccd6ea"/>
<text x="250" y="170" font-size="12">Pharmacist</text>
<circle cx="90" cy="100" r="18" fill="#ffd6c2"/>
<rect x="75" y="115" width="30" height="35" fill="#ffc94d"/>
<circle cx="90" cy="88" r="8" fill="#ff6b6b" opacity="0.85"/>
<text x="70" y="170" font-size="12">Student</text>
</svg>
<h2 id="speaker">Pharmacist</h2>
<p id="dialogue"></p>
<a class="nav" href="menu.html">← Back to menu</a>
</div>
<div class="panel">
<div class="feedback" id="feedback">Tip: Tell your symptoms first. Do not ask for medicine yet.</div>
<div class="options" id="options"></div>
<div id="result" class="result hidden">
<h2 id="endingTitle"></h2><p id="endingText"></p><p id="ideal"></p><button onclick="restart()">Restart</button>
</div>
<button id="nextBtn" class="hidden" onclick="nextQuestion()">Next</button>
</div>
</div>
</div>
<script>
const questions=[
{text:"Hello. What is the problem today?",hint:"Say your symptom.",options:[{text:"I have a headache.",score:1,feedback:"Good start."},{text:"I feel strange.",score:0,feedback:"Too unclear."},{text:"My head started to hurt this afternoon.",score:2,feedback:"Good. You say time and symptom."},{text:"I want pain medicine.",score:0,feedback:"First say your symptom."}]},
{text:"Where does it hurt? What kind of pain is it?",hint:"Say place and feeling.",options:[{text:"My whole head feels strange.",score:0,feedback:"Still unclear."},{text:"The front of my head has a dull pain.",score:2,feedback:"Clear answer."},{text:"The pain feels strong when I look at light.",score:2,feedback:"Good description."},{text:"I do not know.",score:0,feedback:"Try to explain more."}]},
{text:"When did it start? Do you also feel sick or dizzy?",hint:"Say time and other symptoms.",options:[{text:"It started this afternoon. I also feel a little dizzy.",score:2,feedback:"Great answer."},{text:"It started two days ago.",score:1,feedback:"You say time."},{text:"No other symptoms.",score:1,feedback:"You answer part of the question."},{text:"I do not know.",score:0,feedback:"Too little information."}]}
];
const goodEnding={title:"Good Ending",text:"You explain your headache clearly. The pharmacist understands you and gives the right medicine. You feel better later.",ideal:"Good example: My head started to hurt this afternoon. The front of my head has a dull pain. I also feel a little dizzy."};
const badEnding={title:"Bad Ending",text:"You do not explain your headache well. The pharmacist guesses and gives the wrong medicine. Your head still hurts.",ideal:"Next time say: My head started to hurt this afternoon. The front of my head has a dull pain. I also feel a little dizzy."};
let current=0,score=0;const dialogue=document.getElementById('dialogue'),optionsBox=document.getElementById('options'),feedback=document.getElementById('feedback'),nextBtn=document.getElementById('nextBtn'),result=document.getElementById('result'),endingTitle=document.getElementById('endingTitle'),endingText=document.getElementById('endingText'),ideal=document.getElementById('ideal');
function render(){const q=questions[current];dialogue.textContent=q.text;feedback.textContent='Tip: '+q.hint;optionsBox.innerHTML='';q.options.forEach(o=>{const btn=document.createElement('button');btn.textContent=o.text;btn.onclick=()=>choose(o);optionsBox.appendChild(btn);});}
function choose(opt){score+=opt.score;feedback.textContent=opt.feedback;[...optionsBox.children].forEach(b=>b.disabled=true);if(current<questions.length-1){nextBtn.classList.remove('hidden');}else{setTimeout(showEnding,300);}}
function nextQuestion(){current++;nextBtn.classList.add('hidden');render();}
function showEnding(){optionsBox.classList.add('hidden');nextBtn.classList.add('hidden');result.classList.remove('hidden');const end=score>=4?goodEnding:badEnding;endingTitle.textContent=end.title;endingText.textContent=end.text;ideal.textContent=end.ideal;}
function restart(){current=0;score=0;result.classList.add('hidden');optionsBox.classList.remove('hidden');render();}
render();
</script>
</body>
</html>

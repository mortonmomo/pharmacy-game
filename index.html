<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Stomach Pain at the Pharmacy</title>
<style>
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#eef4ff;color:#223047}
.app{max-width:1100px;margin:auto;padding:24px}
h1{margin:0}
.top{margin-bottom:20px}
.game{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.panel{background:#fff;border-radius:20px;border:1px solid #d9e1ee;padding:20px}
.options button{display:block;width:100%;margin:8px 0;padding:12px;border-radius:10px;border:1px solid #d9e1ee;background:#fff;cursor:pointer;font-size:16px}
.options button:hover{background:#eef4ff}
.feedback{margin:12px 0;padding:10px;border-radius:10px;background:#fff9e6}
.hidden{display:none}
.result{padding:16px;border-radius:12px;background:#f4f7ff;margin-top:12px}
.good{color:#1f9d62}
.bad{color:#c94b4b}
</style>
</head>
<body>
<div class="app">
<div class="top">
<h1>Stomach Pain at the Pharmacy</h1>
<p>Learn how to tell your symptoms clearly.</p>
</div>

<div class="game">

<div class="panel">

<!-- Simple pharmacy scene illustration -->
<svg viewBox="0 0 400 220" style="width:100%;margin-bottom:15px">
<rect x="0" y="0" width="400" height="220" fill="#eef4ff"/>

<!-- pharmacy counter -->
<rect x="200" y="120" width="180" height="60" fill="#ffffff" stroke="#ccd6ea"/>

<!-- medicine shelf -->
<rect x="250" y="20" width="120" height="70" fill="#ffffff" stroke="#ccd6ea"/>
<rect x="260" y="30" width="20" height="20" fill="#7ec8ff"/>
<rect x="285" y="30" width="20" height="20" fill="#ffd27e"/>
<rect x="310" y="30" width="20" height="20" fill="#7ee0a0"/>

<!-- pharmacist -->
<circle cx="280" cy="100" r="18" fill="#ffd6c2"/>
<rect x="265" y="115" width="30" height="35" fill="#ffffff" stroke="#ccd6ea"/>
<text x="250" y="170" font-size="12">Pharmacist</text>

<!-- student -->
<circle cx="90" cy="100" r="18" fill="#ffd6c2"/>
<rect x="75" y="115" width="30" height="35" fill="#ffc94d"/>

<!-- stomach pain mark -->
<polygon points="85,135 95,120 105,135" fill="#ff6b6b"/>

<text x="70" y="170" font-size="12">Student</text>
</svg>

<h2 id="speaker">Pharmacist</h2>
<p id="dialogue"></p>
</div>

<div class="panel">
<div class="feedback" id="feedback">Tip: Tell your symptoms first. Do not ask for medicine yet.</div>
<div class="options" id="options"></div>

<div id="result" class="result hidden">
<h2 id="endingTitle"></h2>
<p id="endingText"></p>
<p id="ideal"></p>
<button onclick="restart()">Restart</button>
</div>

<button id="nextBtn" class="hidden" onclick="nextQuestion()">Next</button>
</div>

</div>
</div>

<script>
const questions=[
{
text:"Hello. What is the problem today?",
hint:"Say your symptom.",
options:[
{text:"My stomach hurts.",score:1,feedback:"You say the symptom. Good start."},
{text:"I feel bad.",score:0,feedback:"Too unclear. The pharmacist does not know what hurts."},
{text:"My lower stomach started to hurt at noon today.",score:2,feedback:"Good. You say time and place."},
{text:"I want stomach medicine.",score:0,feedback:"First tell your symptom."}
]
},
{
text:"Where does it hurt? What kind of pain is it?",
hint:"Say place and feeling.",
options:[
{text:"My stomach feels strange.",score:0,feedback:"This answer is still unclear."},
{text:"My lower stomach has a dull pain.",score:2,feedback:"Good. Clear answer."},
{text:"The pain comes and goes like cramps.",score:2,feedback:"You explain the feeling well."},
{text:"I do not know.",score:0,feedback:"Try to say where it hurts."}
]
},
{
text:"When did it start? Do you have diarrhea or nausea?",
hint:"Say time and other symptoms.",
options:[
{text:"It started at noon. I also have some diarrhea.",score:2,feedback:"Great. This gives clear information."},
{text:"It started a few days ago.",score:1,feedback:"You say time but not other symptoms."},
{text:"No other symptoms.",score:1,feedback:"You answer part of the question."},
{text:"I do not know.",score:0,feedback:"The pharmacist needs more information."}
]
}
];

const goodEnding={
title:"Good Ending",
text:"You explain your symptoms clearly. The pharmacist understands you and gives the right medicine. Your stomach feels better later.",
ideal:"Good example: My lower stomach started to hurt at noon. It feels worse after I eat. I also have some diarrhea."
};

const badEnding={
title:"Bad Ending",
text:"You do not explain your symptoms well. The pharmacist guesses the problem and gives the wrong medicine. Your stomach still hurts.",
ideal:"Next time say: My lower stomach started to hurt at noon. It feels worse after I eat. I also have some diarrhea."
};

let current=0;
let score=0;

const dialogue=document.getElementById('dialogue');
const optionsBox=document.getElementById('options');
const feedback=document.getElementById('feedback');
const nextBtn=document.getElementById('nextBtn');
const result=document.getElementById('result');
const endingTitle=document.getElementById('endingTitle');
const endingText=document.getElementById('endingText');
const ideal=document.getElementById('ideal');

function render(){
const q=questions[current];
dialogue.textContent=q.text;
feedback.textContent="Tip: "+q.hint;
optionsBox.innerHTML="";
q.options.forEach(o=>{
const btn=document.createElement("button");
btn.textContent=o.text;
btn.onclick=()=>choose(o);
optionsBox.appendChild(btn);
});
}

function choose(opt){
score+=opt.score;
feedback.textContent=opt.feedback;
[...optionsBox.children].forEach(b=>b.disabled=true);
if(current<questions.length-1){
nextBtn.classList.remove("hidden");
}else{
setTimeout(showEnding,300);
}
}

function nextQuestion(){
current++;
nextBtn.classList.add("hidden");
render();
}

function showEnding(){
optionsBox.classList.add("hidden");
nextBtn.classList.add("hidden");
result.classList.remove("hidden");

const end=score>=4?goodEnding:badEnding;
endingTitle.textContent=end.title;
endingText.textContent=end.text;
ideal.textContent=end.ideal;
}

function restart(){
current=0;
score=0;
result.classList.add("hidden");
optionsBox.classList.remove("hidden");
render();
}

render();
</script>
</body>
</html>
